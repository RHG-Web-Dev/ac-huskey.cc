name: Deploy Astro to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Clean previous dist
        run: rm -rf dist

      - name: Build Astro site
        run: npm run build

      - name: Verify and sanitize dist
        run: |
          echo "Removing symlinks..."
          find dist -type l -exec rm -f {} \;
          echo "Removing hidden files..."
          find dist -name ".*" -type f -exec rm -f {} \;
          echo "Listing dist contents:"
          ls -la dist
          echo "Total dist size:"
          du -sh dist

      - name: Upload artifact for Pages
        uses: actions/upload-artifact@v4
        with:
          name: github-pages
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
        with:
          artifact_name: github-pages