name: Deploy Astro to GitHub Pages (Custom Subdomain)

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      # Checkout repo
      - uses: actions/checkout@v5

      # Build with Astro
      - uses: withastro/action@v5
        with:
          node-version: 20
          cache: npm

      # Disable Jekyll
      - name: Disable Jekyll
        run: touch dist/.nojekyll

      # Deploy to GitHub Pages
      - uses: actions/deploy-pages@v4
        with:
          folder: dist