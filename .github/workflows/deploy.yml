name: Deploy Astro to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages

    steps:
      # 1️⃣ Checkout repo
      - uses: actions/checkout@v5

      # 2️⃣ Build with Astro
      - uses: withastro/action@v5
        with:
          node-version: 20
          cache: npm

      # 3️⃣ Disable Jekyll
      - name: Disable Jekyll
        run: touch dist/.nojekyll

      # 5️⃣ Upload dist/ as artifact (use latest v4)
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: site
          path: dist

      # 6️⃣ Deploy Pages from artifact
      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
        with:
          artifact_name: site